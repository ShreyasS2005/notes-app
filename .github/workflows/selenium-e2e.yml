name: E2E Tests Reports

on:
push:
branches: [main]
pull_request:
branches: [main]

jobs:
selenium-e2e:
name: Selenium E2E Tests
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v5
    with:
      node-version: "20"

  - name: Install web dependencies
    working-directory: website
    run: npm install

  - name: Run Selenium Tests
    working-directory: website
    run: |
      npm run dev &

      for i in {1..60}; do
        if curl -s http://localhost:3000 > /dev/null; then
          break
        fi
        sleep 2
      done

      HEADLESS=true npm test

  - name: Publish Selenium Test Results
    if: always()
    uses: mikepenz/action-junit-report@v5
    with:
      report_paths: "website/reports/**/*.xml"
      detailed_summary: true
      include_passed: true

  - name: Upload Selenium Report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: selenium-test-report
      path: website/reports/
```

appium-report:
name: Publish Existing Appium Results
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Publish Appium Test Results
    if: always()
    uses: mikepenz/action-junit-report@v5
    with:
      report_paths: "android_automation/reports/**/*.xml"
      detailed_summary: true
      include_passed: true
      fail_on_failure: false

  - name: Upload Appium Report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: android-appium-report
      path: android_automation/reports/
```
