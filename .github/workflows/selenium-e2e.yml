name: E2E Tests Report

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run E2E tests locally
        run: npm run test:e2e
        continue-on-error: true
      
      - name: Collect Appium reports
        if: always()
        run: |
          mkdir -p appium-reports
          # Copy locally generated Appium reports without modification
          if [ -d "./appium-reports" ]; then
            cp -r ./appium-reports/* appium-reports/ || true
          fi
          if [ -d "./test-reports" ]; then
            cp -r ./test-reports/* appium-reports/ || true
          fi
      
      - name: Upload Appium test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-test-reports
          path: appium-reports/
          retention-days: 30
      
      - name: Generate workflow summary
        if: always()
        run: |
          echo "## E2E Test Report Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Appium reports collected and archived" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Reports Location**: Artifacts tab - appium-test-reports" >> $GITHUB_STEP_SUMMARY
