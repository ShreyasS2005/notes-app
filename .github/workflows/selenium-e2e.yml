name: E2E Tests (Web & Android)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  selenium-e2e:
    name: Selenium E2E Web Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install web dependencies
        working-directory: website
        run: npm install

      - name: Run Selenium E2E tests
        working-directory: website
        run: |
          npm run dev &

          echo "Waiting for Next.js server..."
          for i in {1..60}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Server is up!"
              break
            fi
            sleep 2
          done

          HEADLESS=true npm test

      - name: Upload Selenium report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: website/reports/selenium-report.xlsx

  appium-e2e:
    name: Appium E2E Android Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Install test runner dependencies
        working-directory: android_automation
        run: npm install

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Run Appium Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86
          profile: pixel
          emulator-boot-timeout: 900
          disable-animations: true
          force-avd-creation: true
          emulator-options: >-
            -no-snapshot
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim

          script: |
            echo "ADB devices:"
            adb devices

            echo "Waiting for emulator..."
            adb wait-for-device

            echo "Waiting for Android boot completion..."
            timeout 600 bash -c '
            until adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; do
              sleep 5
            done
            '

            echo "Unlocking device..."
            adb shell input keyevent 82 || true

            echo "Device status:"
            adb devices
            adb shell getprop ro.build.version.release

            echo "Starting Appium..."
            appium --log appium.log > appium.out 2>&1 &
            sleep 15

            echo "Running tests..."
            cd android_automation
            npm test

      - name: Upload Appium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: |
            appium.log
            appium.out

      - name: Upload Appium report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-appium-report
          path: |
            android_automation/reports/*.xlsx
            android_automation/reports/screenshots/*.png
